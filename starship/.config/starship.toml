# Location:
# ~/.config/starship.toml

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# Change the default prompt format
format = """\
[Ôò¡Ôò┤](238)$os$shell$username\
$all[Ôò░ÔöÇ](238)$character"""

# Change the default prompt characters
[character]
error_symbol = "[¯¬ƒ](238)"
success_symbol = "[¯¬ƒ](238)"

[os]
format = '[$symbol](bold white) '
disabled = false

[os.symbols]
Windows = '¯ÿ¬'
Arch = '¾░úç'
Ubuntu = '´îø'
Macos = '¾░ÇÁ'
EndeavourOS = '´îó '
Android = '´à╗'

# Shows the username
[username]
disabled = false            # disable in powershell
format = "[$user]($style) "
show_always = true
style_root = "black bold"
style_user = "green bold"

[shell]
format = ' with [$indicator]($style) | '
bash_indicator = '¯»è bash'
zsh_indicator = '¾░½½ zsh'
fish_indicator = '¯╣ü fish'
pwsh_indicator = '¾░¿è pwsh'
style = 'purple bold'
disabled = false

[directory]
format = "at [$path]($style)[$read_only]($read_only_style) "
home_symbol = "´Çò  ~"
read_only = " ´Çú "
read_only_style = "197"
truncation_length = 2
truncation_symbol = "ÔÇª/"

[fill]
symbol = "_"

[git_branch]
format = "on [$symbol$branch]($style) "
style = "bold green"
symbol = "´Éÿ "
truncation_length = 5
truncation_symbol = "ÔÇª/"

[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
conflicted = "´äØ "
deleted = "´Çö "
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
format = '[\($all_status$ahead_behind\)]($style) '
modified = "´üä "
renamed = "¾░æò "
staged = '[´âè  \($count\)](green)'
stashed = "¯░ï "
style = "bold green"
untracked = "´ôà :$count"
up_to_date = "´Æí "

[docker_context]
format = "via [´îê $context](bold blue) "

[python]
python_binary = "python3"
symbol = "via [¯£╝ $version]"

[nodejs]
disabled = false
format = "with [¾░ïÿ $version](bold green) "

[bun]
disabled = false
format = "via [¯Ø» $version]($style)"

[package]
format = "is [´Æç $version]($style) "

[php]
format = "with [¾░îƒ  $version](bold purple)"

[lua]
format = "with [¾░ó▒ lua ](bold green)"

[kubernetes]
disabled = false
format = 'on [¾▒â¥ $context\($namespace\)](bold purple) '

[kubernetes.context_aliases]
"clcreative-k8s-production" = "cl-k8s-prod"
"clcreative-k8s-staging" = "cl-k8s-staging"
